<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty Gallery</title>
    <script src="./index.js" defer></script>
    <style>
        :root {
            color-scheme: light;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            background: #f5f5f5;
            color: #222;
        }

        body.modal-open {
            overflow: hidden;
        }

        #app,
        #modal-content {
            position: relative;
            width: 100%;
        }

        #app {
            min-height: 100vh;
            padding: 8px 0 24px;
        }

        #modal {
            position: fixed;
            inset: 0;
            z-index: 999;
            display: none;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
        }

        #modal.is-open {
            display: block;
        }

        #modal-close {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 10;
            border: 0;
            border-radius: 999px;
            padding: 10px 16px;
            background: rgba(0, 0, 0, 0.78);
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }

        #modal-content {
            min-height: 100vh;
            padding: 0 0 24px;
        }

        .modal-title {
            position: absolute;
            top: 18px;
            left: 16px;
            right: 16px;
            z-index: 5;
            font-size: 18px;
            font-weight: 700;
            color: #111;
        }

        .card {
            position: absolute;
            overflow: hidden;
            border-radius: 14px;
            background: #ddd;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #ececec;
        }

        .album-card {
            cursor: pointer;
        }

        .album-card:hover,
        .album-card:focus-visible {
            transform: translateY(-3px);
            box-shadow: 0 16px 36px rgba(0, 0, 0, 0.14);
        }

        .album-card:focus-visible {
            outline: 2px solid #111;
            outline-offset: 2px;
        }

        .card-overlay {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 24px 12px 12px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0));
        }

        .card-title {
            margin: 0;
            color: #fff;
            font-size: 14px;
            line-height: 1.4;
        }

        .app-message {
            max-width: 560px;
            margin: 80px auto 0;
            padding: 0 20px;
            text-align: center;
        }

        .app-message h2 {
            margin: 0 0 12px;
            font-size: 24px;
        }

        .app-message p {
            margin: 0;
            line-height: 1.6;
            color: #666;
        }

        @media (max-width: 640px) {
            #app {
                padding-top: 10px;
            }

            #modal-close {
                top: 10px;
                right: 10px;
            }

            .modal-title {
                font-size: 16px;
            }

            .card-title {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div id="modal" aria-hidden="true">
        <button id="modal-close" type="button" aria-label="Close gallery">Close</button>
        <div id="modal-content"></div>
    </div>
    <main id="app"></main>
</body>
</html>
