<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty Gallery</title>
    <script src="./index.js" defer></script>
    <style>
        :root {
            color-scheme: light;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            --bg: #efede6;
            --panel: rgba(255, 252, 247, 0.78);
            --border: rgba(49, 42, 34, 0.12);
            --text: #221d18;
            --muted: #6e655d;
            --shadow: 0 18px 48px rgba(34, 29, 24, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.9), transparent 26%),
                linear-gradient(180deg, #f5f2eb, #e8e1d7);
            color: var(--text);
        }

        body {
            overflow: hidden;
        }

        body.modal-open {
            overflow: hidden;
        }

        button {
            font: inherit;
        }

        .surface-shell {
            position: relative;
            height: 100vh;
            overflow: hidden;
        }

        .surface-toolbar {
            position: fixed;
            top: 16px;
            left: 16px;
            right: 16px;
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            pointer-events: none;
        }

        .surface-toolbar > * {
            pointer-events: auto;
        }

        .toolbar-card {
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 10px 14px;
            background: var(--panel);
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
        }

        .toolbar-title {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .toolbar-title strong {
            font-size: 15px;
            font-weight: 700;
        }

        .toolbar-title span {
            color: var(--muted);
            font-size: 12px;
        }

        .toolbar-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar-controls .zoom-label {
            min-width: 52px;
            text-align: center;
            color: var(--muted);
            font-size: 13px;
            font-variant-numeric: tabular-nums;
        }

        .tool-button {
            border: 1px solid rgba(34, 29, 24, 0.12);
            border-radius: 12px;
            padding: 9px 12px;
            background: rgba(255, 255, 255, 0.9);
            color: var(--text);
            cursor: pointer;
            transition: transform 0.16s ease, background 0.16s ease;
        }

        .tool-button:hover,
        .tool-button:focus-visible {
            background: #fff;
            transform: translateY(-1px);
        }

        .tool-button:focus-visible {
            outline: 2px solid #1f1a15;
            outline-offset: 2px;
        }

        .tool-button.is-strong {
            background: rgba(34, 29, 24, 0.92);
            color: #fff;
        }

        .surface-viewport {
            position: absolute;
            inset: 0;
            overflow: hidden;
            touch-action: none;
            cursor: grab;
            background:
                linear-gradient(90deg, rgba(255, 255, 255, 0.22) 1px, transparent 1px),
                linear-gradient(rgba(255, 255, 255, 0.2) 1px, transparent 1px);
            background-size: 28px 28px;
            background-position: center;
        }

        .surface-viewport.is-dragging {
            cursor: grabbing;
        }

        .surface-canvas {
            position: absolute;
            inset: 0 auto auto 0;
            transform-origin: 0 0;
            will-change: transform;
        }

        .surface-canvas.is-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            inset: 0;
        }

        .modal-layer {
            position: fixed;
            inset: 0;
            z-index: 999;
            display: none;
            background: rgba(243, 238, 231, 0.86);
            backdrop-filter: blur(14px);
        }

        .modal-layer.is-open {
            display: block;
        }

        .card {
            position: absolute;
            overflow: hidden;
            border-radius: 16px;
            background: #ddd;
            box-shadow: 0 12px 34px rgba(28, 23, 18, 0.14);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            user-select: none;
            -webkit-user-drag: none;
        }

        .card img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #ece7e0;
            pointer-events: none;
        }

        .album-card {
            cursor: pointer;
        }

        .album-card:hover,
        .album-card:focus-visible {
            transform: translateY(-3px);
            box-shadow: 0 18px 44px rgba(28, 23, 18, 0.2);
        }

        .album-card:focus-visible {
            outline: 2px solid #201b15;
            outline-offset: 2px;
        }

        .card-overlay {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 28px 14px 14px;
            background: linear-gradient(to top, rgba(17, 14, 10, 0.76), rgba(17, 14, 10, 0));
        }

        .card-title {
            margin: 0;
            color: #fff;
            font-size: 14px;
            line-height: 1.4;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.25);
        }

        .modal-title {
            position: absolute;
            top: 18px;
            left: 22px;
            right: 22px;
            z-index: 2;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.01em;
        }

        .app-message {
            max-width: 620px;
            padding: 32px 28px;
            border: 1px solid var(--border);
            border-radius: 24px;
            background: rgba(255, 253, 249, 0.9);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .app-message h2 {
            margin: 0 0 12px;
            font-size: 26px;
        }

        .app-message p {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
        }

        @media (max-width: 720px) {
            .surface-toolbar {
                top: 12px;
                left: 12px;
                right: 12px;
                flex-direction: column;
                align-items: stretch;
            }

            .toolbar-card {
                justify-content: space-between;
                gap: 12px;
            }

            .toolbar-controls {
                flex-wrap: wrap;
                justify-content: flex-end;
            }

            .toolbar-title span {
                display: none;
            }

            .modal-title {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <main class="surface-shell">
        <div class="surface-toolbar">
            <div class="toolbar-card">
                <div class="toolbar-title">
                    <strong>Beauty Gallery</strong>
                    <span>拖动画布移动，双指捏合或按住 Ctrl/Cmd 加滚轮缩放</span>
                </div>
            </div>
            <div class="toolbar-card toolbar-controls" data-surface-controls="app">
                <button class="tool-button" type="button" data-action="zoom-out" data-target="app">-</button>
                <span class="zoom-label" data-zoom-label="app">100%</span>
                <button class="tool-button" type="button" data-action="zoom-in" data-target="app">+</button>
                <button class="tool-button" type="button" data-action="fit" data-target="app">Fit</button>
                <button class="tool-button" type="button" data-action="reset" data-target="app">Reset</button>
            </div>
        </div>
        <div id="app-viewport" class="surface-viewport" aria-label="Gallery canvas">
            <div id="app-canvas" class="surface-canvas"></div>
        </div>
    </main>

    <div id="modal" class="modal-layer" aria-hidden="true">
        <div class="surface-toolbar">
            <div class="toolbar-card">
                <div class="toolbar-title">
                    <strong>Album View</strong>
                    <span>这里也支持双指缩放和整图适配</span>
                </div>
            </div>
            <div class="toolbar-card toolbar-controls" data-surface-controls="modal">
                <button class="tool-button" type="button" data-action="zoom-out" data-target="modal">-</button>
                <span class="zoom-label" data-zoom-label="modal">100%</span>
                <button class="tool-button" type="button" data-action="zoom-in" data-target="modal">+</button>
                <button class="tool-button" type="button" data-action="fit" data-target="modal">Fit</button>
                <button class="tool-button" type="button" data-action="reset" data-target="modal">Reset</button>
                <button id="modal-close" class="tool-button is-strong" type="button" aria-label="Close gallery">Close</button>
            </div>
        </div>
        <div id="modal-viewport" class="surface-viewport" aria-label="Album canvas">
            <div id="modal-canvas" class="surface-canvas"></div>
        </div>
    </div>
</body>
</html>
